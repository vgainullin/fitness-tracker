name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-apps-script:
    runs-on: ubuntu-latest
    if: vars.SCRIPT_ID != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Write clasp credentials
        run: |
          echo '{"token":${{ toJSON(secrets.CLASP_TOKEN) }}}' > ~/.clasprc.json
          echo '{"scriptId":"${{ vars.SCRIPT_ID }}","rootDir":"apps-script"}' > .clasp.json
      - run: npx clasp push --force
